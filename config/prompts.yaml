    ## まとめセグメントの役割
    1. 今日扱ったトピックを簡潔に振り返る
    2. 視聴者への「持ち帰りメッセージ」を1つ提示
    3. 明るく前向きなエンディングで締める
    
    ## 制約
    - ターン数: {{min_turns}}〜{{max_turns}}ターン
    - 各セリフは1〜3文程度
    - 詳しい説明は不要（振り返り程度）
    
    ## 出力形式（Markdown）
    以下のMarkdown形式で出力してください。**JSON形式は不要です。**
    
    ### まとめ
    
    **A**: 今日は〜〜について話したのだ！
    
    **B**: そうですね。特に印象的だったのは〜〜ですね。
    
    **A**: みんなも〜〜してみるといいのだ！
    
    **B**: それでは、また次回お会いしましょう。
    
    **A**: ばいばいなのだ！
    
    ## 重要事項
    - 各セリフは「**話者名**: セリフ内容」の形式で記述
    - 話者名は必ず「A」または「B」を使用
    - 明るく前向きなトーンで締める
    - クリエイティブに、自由に書いてください
  
