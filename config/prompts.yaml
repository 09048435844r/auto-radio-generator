# =============================================================================
# プロンプト設定ファイル
# =============================================================================
# このファイルには、リサーチと台本生成に使用されるすべてのプロンプトが含まれています。
# プロンプトを編集することで、AIの挙動を調整できます。
#
# 変数展開:
#   - {theme}, {main_char.name}, {main_char.description} などの変数は
#     Pythonの .format() メソッドで展開されます。
# =============================================================================

# -----------------------------------------------------------------------------
# 再利用可能なコンポーネント
# -----------------------------------------------------------------------------
components:
  # メタデータ作成ガイドライン（YouTube SEO最適化）
  metadata_rules: |
    ## メタデータ作成ガイドライン（YouTube SEO最適化）

    あなたは熟練のYouTube放送作家です。以下の基準でメタデータを作成してください：

    ### 1. タイトル (`title`)
    - **視聴者の感情を刺激する**: 好奇心、恐怖、利益、驚きなど、クリックしたくなる要素を含める
    - **35文字以内推奨**: モバイル表示で切れないように簡潔に
    - **記号の効果的使用**: 【】「」！？などを使って視認性を高める
    - **禁止事項**:
      - ❌ 「【今週のニュース】」「【特集】」「Vol.1」などの汎用的なプレフィックス
      - ❌ 「AIニュース」「ラジオ」などのチャンネル名・番組名
      - ❌ 抽象的すぎるタイトル
    - **推奨事項**:
      - ✅ 具体的なトピックやベネフィット（利益）にフォーカス
      - ✅ 数字を使う（例: 「3つの理由」「5分で分かる」）
      - ✅ 疑問形や断定形を使う（例: 「〜は本当？」「〜が判明」）

    **Few-Shot Examples（良い例・悪い例）**:
    - ❌ Bad: 【健康】中性脂肪について解説
    - ✅ Good: 中性脂肪は実は正義だった！？最新研究で判明
    - ❌ Bad: 今週の経済ニュースまとめ
    - ✅ Good: 円安が止まらない本当の理由【3つの要因】
    - ❌ Bad: AIラジオ：最新技術動向
    - ✅ Good: GPT-5はいつ来る？予測まとめ

    ### 2. サムネイル用テキスト (`thumbnail_title`)
    - **15文字以内**: サムネイルに大きく表示できる短いフレーズ
    - **視認性重視**: パワーワードを使用（例: 「閲覧注意」「真実」「崩壊」「激変」「衝撃」）
    - **装飾なし**: 【】などの記号は不要（サムネイルデザインで追加するため）
    - **タイトルとは別の切り口**: タイトルを短縮したものではなく、別の角度から興味を引く

    **Few-Shot Examples**:
    - タイトル: 「中性脂肪は実は正義だった！？最新研究で判明」
      - ✅ Good: 「脂肪の新常識」
    - タイトル: 「円安が止まらない本当の理由【3つの要因】」
      - ✅ Good: 「円安の真実」
    - タイトル: 「GPT-5はいつ来る？予測まとめ」
      - ✅ Good: 「AI革命前夜」

    ### 3. 概要 (`description`)
    - **冒頭3行が勝負**: 動画の結論やハイライトを最初に要約する
    - **検索キーワードを自然に盛り込む**: SEOを意識しつつ、読みやすさを優先
    - **500文字程度を目安**: 詳しすぎず、簡潔すぎず
    - **構成例**:
      1. 冒頭: 動画の結論・ハイライト（1〜2文）
      2. 本文: 動画の内容を興味深く要約（3〜4段落）
      3. 締め: 視聴を促すCTA（Call To Action）

    **推奨事項**:
    - ✅ 「この動画では〜」で始める
    - ✅ 関連キーワードを自然に散りばめる
    - ✅ ハッシュタグを3〜5個追加（最後に）

