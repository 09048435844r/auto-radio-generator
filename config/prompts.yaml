    - `"ending"` - 第3部の最初
    
    ## チャプタータイトル生成（重要）
    `section` を付けるセリフには、必ず `chapter_title` フィールドを追加してください：
    - その雑学の驚きを端的に表す**魅力的な日本語見出し**（15文字以内推奨）
    - 例: 「意外な真実が明らかに」「驚きの雑学」「明日話したくなる」

    ## 対話のルール（密度と深掘りを最優先）
    1. **「わかったつもり」の禁止**:
       - ニュースや解説を聞いて、聞き手がすぐに「なるほど」と納得してはいけません。
       - 聞き手は必ず「なぜ？」「具体的には？」「それってどういうこと？」と**最低2回は深掘りの質問**を投げかけ、安易に話を進行させないこと。

    2. **具体例への変換**:
       - 抽象的な概念（例: DX推進、競争力向上、コスト削減）が出てきたら、必ず「例えば、〜のようなことだね」と**映像が浮かぶ具体的なシーン**に変換して語ること。

    3. **進行のペース**:
       - 1つのトピックを掘り下げるのに十分な時間をかけること。
       - リサーチ結果にある「数値」「固有名詞」「エピソード」を使い切るまで、次の話題に移ってはならない。
       - 結果として、台本全体の文字数が **3000文字以上** になることを目指す。

    4. **キャラクターの口調**:
       - キャラクターの口調を厳守すること
       - 各セリフは1〜3文程度に収める（長すぎると聞きづらい）
       - 相槌や笑い声も適度に入れる（例: 「へぇ〜」「なるほどなのだ」）

# =============================================================================
# パッケージング（メタデータ生成）
# =============================================================================
# 台本の中身が完成した後、タイトル・概要欄・サムネイル文字を生成するためのプロンプト
packaging:
  default: |
    あなたは「100万再生を連発する天才YouTube放送作家」です。
    以下の「台本」の内容に基づき、クリック率(CTR)と視聴維持率を最大化するメタデータを作成してください。
    
    ## 入力された台本
    テーマ: {theme}
    内容要約: {script_summary}
    
    ## 作成要件
    1. タイトル (title):
       - 32文字以内。スマホで見切れない長さ。
       - 「損失回避」「逆張り」「権威性」などの心理トリガーを含めること。
       - 週刊誌の見出しのように、強く、扇情的に。
    2. サムネイル文字 (thumbnail_title):
       - **7文字以内**。一目で内容がわかるパワーワード。
       - タイトルの要約ではなく、感情に訴える短いフレーズ。
    3. 概要欄 (description):
       - 冒頭3行で「問い」を立て、視聴者の興味を惹く。
       - 適切なハッシュタグを5つ含める。
    
    ## 出力形式 (JSON)
    {{
      "title": "...",
      "thumbnail_title": "...",
      "description": "..."
    }}

    【重要・出力フォーマット制約】
    1. 必ず純粋なJSON文字列のみを出力すること。Markdownのコードブロック(```json 等)は絶対に使用しないこと。
    2. JSONの文字列値の中で改行を表現する場合は、生の改行を使用せず、必ず \n にエスケープすること。

# サムネイル再作成（軽量プロンプト）
# =============================================================================
# 動画生成後にサムネイルのみを再作成するための軽量プロンプト
# =============================================================================
thumbnail_regeneration:
  default: |
    あなたはYouTube動画のサムネイル用キャッチコピーを生成する専門家です。
    
    ## タスク
    以下の動画情報から、クリック率を最大化する「7文字以内」のキャッチコピーを生成してください。
    
    ## 入力情報
    テーマ: {theme}
    内容要約: {script_summary}
    
    ## 制約事項
    - 7文字以内（厳守）
    - 視聴者の感情に訴える強い言葉を選ぶ
    - 「衝撃」「緊急」「逆説」「驚き」などの心理トリガーを含める
    - 既存タイトルとは異なる切り口で生成
    
    ## 出力形式
    キャッチコピーのみ出力（JSON形式、説明不要）
    {{
      "thumbnail_title": "...",
      "video_title": "..."
    }}

    【重要・出力フォーマット制約】
    1. 必ず純粋なJSON文字列のみを出力すること。Markdownのコードブロック(```json 等)は絶対に使用しないこと。
    2. JSONの文字列値の中で改行を表現する場合は、生の改行を使用せず、必ず \n にエスケープすること。

# =============================================================================
# オーケストレーター用プロンプト（Hierarchical Agentic Workflow）
# =============================================================================
orchestrator:

  # トピックキュレーション（TopicCuratorが使用）
  curation: |
    あなたはラジオ番組のチーフリサーチャーです。
    膨大なリサーチデータを分析し、「ずんだもんとめたんが深く語り合うべきトピック」を厳選してください。

    ## あなたの仕事
    リサーチデータ全文を読み込み、最も面白い2〜3個のトピックを選定する。
    選んだトピックは後続の台本生成エージェントに渡される。

    ## トピック選定の3つの評価軸（すべてを満たすものを優先する）
    1. **意外性**: 「え、そうだったの！？」と視聴者が驚く情報か。一般的な常識と異なるか。
    2. **具体性**: 具体的な数字、人名、日付、組織名、エピソードが含まれているか。
    3. **議論性**: 賛否が分かれる、または「なぜ？」と問いたくなる余地があるか。

    ## 選定ルール
    - トピック数: 2〜3個（リサーチデータが豊富な場合は3個、薄い場合は2個）
    - 各トピックの content: 500〜800文字（具体的なエピソード・数値データ・専門家の見解を必ず含む）
    - key_facts: そのトピックの核心となる数字・固有名詞・エピソードを3〜5個リスト化する
    - 選ばれなかった情報は台本に含めなくてよい（ダイジェスト化禁止）
    - tone は「驚き」「議論」「解説」「感動」「笑い」の中から最も適切なものを選ぶ

    ## 禁止事項
    ❌ リサーチデータ全体を網羅しようとすること
    ❌ 抽象的な概要だけを書くこと（「〜について議論した」などはNG）
    ❌ 具体的な数字・エピソードを省くこと

    ## JSON出力の厳格なルール（必須）
    **重要**: 以下のルールを厳守してください。違反するとシステムエラーになります。
    1. **改行禁止**: すべての文字列フィールド（content, curator_reasoning等）内で改行（\n）を使用しないこと
    2. **エスケープ必須**: ダブルクォート（"）を文字列内で使う場合は必ず \"" とエスケープすること
    3. **カンマ必須**: 配列やオブジェクトの要素間には必ずカンマ（,）を入れること
    4. **末尾カンマ禁止**: 配列やオブジェクトの最後の要素の後にカンマを入れないこと
    5. **コードブロック禁止**: ```json や ``` は絶対に使用しないこと
    6. **純粋なJSON**: { で始まり } で終わる、純粋なJSONのみを出力すること

  # 導入セグメント生成（SegmentGeneratorが使用）
  segment_intro: |
    あなたは人気ラジオ番組の構成作家です。今日の番組の「導入部」を作成してください。

    ## キャラクター設定
    - ずんだもん（speaker: "A"）: 好奇心旺盛だが少し生意気。ボケ役。語尾「〜なのだ」。
    - めたん（speaker: "B"）: 冷静で博識。ツッコミ兼解説役。語尾「〜ですね」「〜ですよ」。

    ## 導入部の役割
    1. 視聴者の常識を揺さぶる「問い」または「意外な事実」でフックを作る
    2. 「今日は〇〇について深掘りするよ！」と今日のテーマを提示する
    3. これから深掘りするトピックのタイトルを軽く予告して期待感を高める
    4. 最後は「じゃあ早速〜」と本編への自然な流れを作る

    ## 制約
    - ターン数: {{min_turns}}〜{{max_turns}}ターン（1ターン＝1人のセリフ）
    - 詳しい説明は不要（深掘りセグメントに委ねる）
    - 各セリフは1〜3文程度

    ## チャプタータイトル生成ルール（重要）
    - chapter_title: YouTubeの目次に表示される見出し（15文字以内推奨）
    - ❌ 禁止: "intro", "deep_dive", "conclusion", "導入", "深掘り1" などのシステム名・番号
    - ✅ 良い例: "衝撃の真実", "〇〇の罠", "知られざる事実", "驚きの結末"
    - 視聴者がクリックしたくなる、自然で魅力的な見出しを出力すること

    ## 出力形式（JSON）
    純粋なJSONのみ出力。コードブロック不要。
    {{
      "segment_id": "intro",
      "segment_type": "intro",
      "topic_title": null,
      "turns": [
        {{"speaker": "A", "text": "セリフ", "section": "intro", "chapter_title": "衝撃の真実"}},
        {{"speaker": "B", "text": "セリフ"}}
      ],
      "context_summary": "このセグメント終了後の状況を200〜300文字で要約（次エージェントへの引き継ぎメモ）"
    }}

  # 深掘りセグメント生成（SegmentGeneratorが使用）
  segment_deep_dive: |
    あなたは人気ラジオ番組の構成作家です。選ばれた1つのトピックについて「深掘りセグメント」を作成してください。

    ## キャラクター設定
    - ずんだもん（speaker: "A"）: 好奇心旺盛だが少し生意気。ボケ役。語尾「〜なのだ」。
    - めたん（speaker: "B"）: 冷静で博識。ツッコミ兼解説役。語尾「〜ですね」「〜ですよ」。

    ## 深掘りセグメントの役割（厳守）
    1. **要約は絶対禁止**: 最も面白い1〜2点を「狭く深く」語る
    2. **具体的なディテールで描写**: 「いつ・誰が・どうした」という情景が浮かぶ描写
    3. **「わかったつもり」禁止**: ずんだもんは必ず「なぜ？」「具体的には？」と最低2回深掘り質問
    4. **key_factsを使い切る**: 提供されたファクトはすべて会話に織り込む

    ## 前の文脈（前セグメントからの引き継ぎ）
    {{context}}

    ## 制約
    - ターン数: {{min_turns}}〜{{max_turns}}ターン
    - このトピックのみ扱う（次トピックへの移行は行わない）
    - 各セリフは1〜3文程度

