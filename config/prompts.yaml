    - ✅ 良い例: "独占崩壊の真実", "〇〇の罠", "驚きの実態", "知られざる裏側"
    - トピックの核心を15文字以内で表現し、視聴者がクリックしたくなる魅力的な見出しを出力すること

    ## 出力形式（JSON）
    純粋なJSONのみ出力。コードブロック不要。
    {{
      "segment_id": "{{segment_id}}",
      "segment_type": "deep_dive",
