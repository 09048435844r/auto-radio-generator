# =============================================================================
# 自動ラジオ動画生成システム v3.3.2 - 設定ファイル
# =============================================================================
# このファイルでは、動画生成の全プロセスに関する設定を管理します。
# 
# v3.3.2 新機能:
# - 第2部モード: 1つのテーマで2部構成のラジオ番組を生成
# - APIヘルスチェック: 生成前にGemini/Perplexity接続状態を確認
# - 話者逆転自動補正: 第2部での声割当ミスを自動検出・修正
# - リトライ処理: API接続エラー時に自動再試行（最大2回）
# - 温度制御: 第2部モードでtemperatureを0.7に下げ、JSON安定性向上
#
# v3.3.0 新機能:
# - NVENC GPU高速化: NVIDIA GPUによるハードウェアエンコード対応
# - Mock開発モード: API課金なしでワークフロー全体をテスト可能
# - 進捗可視化UI: Gradio進捗バーで各フェーズの状況をリアルタイム表示
# - 後方互換性強化: 旧JSON形式の自動変換バリデータ追加
#
# 設定項目:
# - リサーチ（Perplexity API）
# - 台本生成（Gemini API）
# - 音声合成（VOICEVOX）
# - 動画レンダリング（FFmpeg）
# - パーソナリティ設定
# - 開発用設定（Mock Mode）
# =============================================================================

# -----------------------------------------------------------------------------
# リサーチ設定（Perplexity API）
# -----------------------------------------------------------------------------
# テーマに関する情報を事前調査し、台本生成の素材を提供します。
researcher:
  model: "sonar-pro"                     # Perplexityモデル（純粋な検索・抽出に特化）
  max_tokens: 16384            # 最大トークン数（リサーチ結果の長さ・高密度化のため拡大）
  max_queries_per_plan: 3      # 1回の企画で採用する検索クエリ上限
  max_requests_per_workflow: 6 # 1ワークフロー内で許可するPerplexity呼び出し上限（ハードリミット）
  enable_session_cache: true   # 同一セッション内で同一クエリのリサーチ結果を再利用
  
  # リサーチモード定義（5種類）
  # 各モードで異なる視点からテーマを調査します。
  modes:
    debate:
      name: "ディベート"
      description: "賛成・反対の両論を調査し、議論のポイントを整理"
      system_prompt: |
        以下の要件を満たす詳細なファクトシートをMarkdown形式で作成してください。挨拶・前置き・締めの言葉は不要。事実のみを記述すること。

        ## 必須要件
        - **情報密度**: 各主張について最低300文字以上の詳細な説明
        - **具体性**: 抽象的表現を避け、具体的な数字・日付・人名・組織名・統計データを含める
        - **引用**: 専門家・研究者・有識者の具体的な発言や研究結果を引用
        - **合計文字数**: 最低3000文字以上

        ## 調査項目
        ### 1. 賛成派の主張（3つ以上、各300文字以上）
        各主張について以下を含める：
        - 主張の核心と具体的な根拠
        - 支持する統計データ・研究結果（出典付き）
        - 著名な支持者・組織名と具体的な発言
        - 実際の成功事例・導入事例

        ### 2. 反対派の主張（3つ以上、各300文字以上）
        各主張について以下を含める：
        - 主張の核心と具体的な根拠
        - 反証するデータ・研究結果（出典付き）
        - 著名な批判者・組織名と具体的な発言
        - 実際の失敗事例・問題事例

        ### 3. 議論の争点
        - 両者が一致しない核心的な論点を3つ以上列挙
        - 各争点について賛否両陣営の具体的な主張を対比

        ### 4. 専門家コンセンサスと最新動向
        - 学術界・業界の現在の主流見解
        - 直近1年以内の重要な研究発表・政策変更・事件

        ## 出力形式
        Markdown見出し（##, ###）で明確に区切る。専門用語には簡潔な説明を付ける。
    voices:
      name: "世間の声"
      description: "SNSの反応や一般的な意見、ユーモアを収集"
      system_prompt: |
        以下の要件を満たす詳細なファクトシートをMarkdown形式で作成してください。挨拶・前置き・締めの言葉は不要。事実のみを記述すること。

        ## 必須要件
        - **情報密度**: 各セクションについて最低500文字以上の詳細な説明
        - **具体性**: 実際の投稿内容・反応の傾向を具体的に描写（匿名化したうえで内容の傾向を示す）
        - **定量性**: 反応の規模・割合・トレンド強度を数値で示す
        - **合計文字数**: 最低3000文字以上

        ## 調査項目
        ### 1. Twitter/X・SNSでの反応（500文字以上）
        - 主要なハッシュタグと投稿数・拡散規模
        - 賛否・感情の分布（肯定的/否定的/中立の割合の概算）
        - 代表的な意見の傾向（具体的な言葉・表現のパターン）
        - バイラルになった投稿・ミームの内容と拡散規模

        ### 2. 世代別・属性別の反応の違い（500文字以上）
        - 10代・20代・30代・40代以上の反応の違い
        - 性別・職業・地域による見解の差異
        - 専門家層 vs 一般層の反応の乖離

        ### 3. ユーモア・ミーム・ネットスラング（300文字以上）
        - このテーマに関連するネットミームや流行語
        - ユーモラスな切り口や皮肉的な表現のパターン
        - 「あるある」として共感される点

        ### 4. 批判・懸念の声（500文字以上）
        - 主な批判点とその根拠
        - 懸念されているリスクや問題点
        - 専門家からの否定的な見解

        ### 5. 支持・称賛の声（500文字以上）
        - 主な支持理由と具体的なメリット体験談
        - 成功体験・ポジティブな事例
        - インフルエンサー・著名人の発言内容

        ## 出力形式
        Markdown見出し（##, ###）で明確に区切る。
    trivia:
      name: "トリビア"
      description: "あまり知られていない事実や歴史的背景を調査"
      system_prompt: |
        以下の要件を満たす詳細なファクトシートをMarkdown形式で作成してください。挨拶・前置き・締めの言葉は不要。事実のみを記述すること。

        ## 必須要件
        - **情報密度**: 各事実について最低300文字以上の詳細な説明
        - **具体性**: 抽象的表現を避け、具体的な数字・日付・人名・組織名を含める
        - **多角性**: 技術的・歴史的・社会的・経済的側面など複数の観点から分析
        - **引用**: 専門家の見解・研究結果・統計データを可能な限り引用
        - **合計文字数**: 最低3000文字以上

        ## 調査項目
        ### 1. 意外と知られていない事実（5つ以上、各300文字以上）
        各事実について以下を含める：
        - 発見の経緯・背景（いつ、誰が、どのように発見したか）
        - 具体的な数字・統計データ
        - 専門家の評価・見解（引用）
        - 社会的影響・技術的意義

        ### 2. 歴史的な背景や由来（500文字以上）
        - 時系列で整理（具体的な年月日とともに）
        - 主要なマイルストーンと転換点
        - 各時期の技術的・社会的背景
        - 重要な人物・組織の役割

        ### 3. 関連する面白いエピソード（3つ以上）
        - 単なる逸話ではなく、そのエピソードが示す本質的な意味や影響を分析
        - 関連する人物・組織の具体的な行動と結果

        ### 4. 専門家でも意見が分かれるポイント（300文字以上）
        - 各立場の主張と根拠を詳細に説明
        - 最新の研究動向や議論の焦点
        - 未解決の謎や課題

        ## 出力形式
        Markdown見出し（##, ###）で明確に区切る。箇条書きと段落を適切に組み合わせる。専門用語には簡潔な説明を付ける。
    weekly_digest:
      name: "今週のまとめ"
      description: "直近1週間の重要ニュースをトップ3形式でまとめる"
      system_prompt: |
        以下の要件を満たす詳細なニュースファクトシートをMarkdown形式で作成してください。挨拶・前置き・締めの言葉は不要。事実のみを記述すること。

        ## 必須要件
        - **情報密度**: 各ニュースについて最低600文字以上の詳細な説明
        - **5W1H必須**: いつ（具体的な日付）、どこで、誰が、何を、なぜ、どのように
        - **定量データ**: 数字・規模・影響範囲を具体的な数値で示す
        - **反応の具体性**: SNSの反応規模、専門家の具体的な発言・評価
        - **合計文字数**: 最低3000文字以上

        ## 調査対象
        このトピックに関連する「直近1ヶ月以内の重要な出来事」をトップ3つ選定してください。
        （「今週」等の厳密な期間指定は避け、「最近・最新」など広義の言葉を使用すること）

        ## 各ニュースのフォーマット（3つ分）

        ### News 1: [見出し]
        #### 事実 (The Facts)
        - いつ（具体的な年月日）、どこで（具体的な場所・組織）、誰が（氏名・組織名）、何を（具体的なアクション）
        - 定量的なデータ（金額・人数・割合・規模など）

        #### 背景 (Context)
        - なぜこれが今話題なのか？ これまでの経緯を時系列で
        - 関連する過去の出来事・前提条件
        - 業界・社会の構造的な問題との関連

        #### 影響 (Impact)
        - 直接的な影響：影響を受ける人数・組織・市場規模
        - 間接的な影響：業界全体・社会への波及効果
        - 今後の展望：予測される変化・リスク・機会

        #### 反応 (Reactions)
        - SNS・メディアの反応規模（投稿数・閲覧数など）
        - 専門家・有識者の具体的な発言（引用）
        - 賛否両論の主な論点

        ### News 2: [見出し]
        （上記と同一フォーマット）

        ### News 3: [見出し]
        （上記と同一フォーマット）
    lecture:
      name: "解説・講座"
      description: "初心者向けに比喩を使って分かりやすく解説"
      system_prompt: |
        以下の要件を満たす詳細なファクトシートをMarkdown形式で作成してください。挨拶・前置き・締めの言葉は不要。事実のみを記述すること。

        ## 必須要件
        - **情報密度**: 各セクションについて最低400文字以上の詳細な説明
        - **比喩・アナロジー**: 身近なものへの例え話を3つ以上含める
        - **具体例**: 実際の使用例・活用事例を5つ以上含める
        - **定量データ**: 市場規模・ユーザー数・成長率などの数値を含める
        - **合計文字数**: 最低3000文字以上

        ## 調査項目
        ### 1. 基本的な定義・概念（400文字以上）
        - 専門用語を使わない平易な説明
        - 「一言で言うと何か」を3つの異なる表現で説明
        - 関連する用語・概念との違い・関係性

        ### 2. 比喩・アナロジー（3つ以上）
        各比喩について：
        - 何に例えるか（日常的なもの・誰でも知っているもの）
        - どの点が似ているか・違うか
        - その比喩で理解できること・できないこと

        ### 3. 仕組み・構造（400文字以上）
        - 技術的な仕組みを段階的に説明
        - 全体の流れ・プロセス
        - 重要なコンポーネントとその役割

        ### 4. 実際の使用例・活用方法（5つ以上）
        各事例について：
        - 具体的な企業名・製品名・プロジェクト名
        - 導入前後の変化・効果（数値で示す）
        - 成功要因・失敗要因

        ### 5. よくある誤解・注意点（3つ以上）
        - 誤解の内容と正しい理解
        - 誤解が生じる原因
        - 実際の被害事例・リスク

        ### 6. 初心者が驚くエピソード・豆知識
        - 開発秘話・意外な起源
        - 知られていない事実・数字
        - 将来性・可能性

        ## 出力形式
        Markdown見出し（##, ###）で明確に区切る。専門用語には必ず簡潔な説明を付ける。

# -----------------------------------------------------------------------------
# 台本生成エンジン設定（Gemini API）
# -----------------------------------------------------------------------------
# リサーチ結果を基に、多様な形式のラジオ台本を自動生成します。
# - 標準モード: 3部構成（本題/リスナーメール/エンディング）
# - 週次ダイジェスト: ニュースキャスター形式でトップ3ニュースを紹介
# - 講座モード: 先生と生徒の対話形式で初心者向けに解説
script_generator:
  # デフォルトプロバイダー（"gemini" | "openai" | "anthropic"）
  default_provider: "gemini"
  
  # Gemini設定
  gemini:
    model: "gemini-3.1-pro-preview"              # メインモデル（高品質・最新）
    fallback_model: "gemini-2.5-pro"     # フォールバックモデル（高速）
    flash_model: "gemini-3-flash-preview"      # 軽量モデル（サムネイル再作成用）
    max_tokens: 16384                     # 最大トークン数（台本の長さ）
    # 料金情報（USD per 1M tokens）
    costs:
      gemini-3.1-pro-preview:
        input: 1.50
        output: 12.00
      gemini-2.5-pro:
        input: 1.25
        output: 10.00
      gemini-2.5-flash:
        input: 0.30
        output: 2.50
      gemini-2.5-flash-lite:
        input: 0.10
        output: 0.40
      gemini-3.1-flash-preview:
        input: 0.40
        output: 3.00
      gemini-1.5-pro:
        input: 1.25
        output: 5.00
      gemini-1.5-flash:
        input: 0.075
        output: 0.30
      gemini-1.0-pro:
        input: 0.50
        output: 1.50
  
  # OpenAI設定
  openai:
    model: "gpt-5.4"                      # メインモデル（最新・高品質）
    fallback_model: "gpt-5.4-mini"        # フォールバックモデル（コスト効率重視）
    max_tokens: 16384                      # 最大トークン数
    temperature: 0.85                      # 創造性パラメータ
    # 料金情報（USD per 1M tokens）
    costs:
      gpt-5.4-2026-03-05:
        input: 2.50
        output: 15.00
      gpt-5.4-mini:
        input: 0.75
        output: 4.50
      gpt-5.3-chat-latest:
        input: 1.00
        output: 6.00
      o3-mini:
        input: 1.10
        output: 4.40
      gpt-4o-2024-05-13:
        input: 3.75
        output: 15.00
      gpt-4o-mini-2024-07-18:
        input: 0.30
        output: 1.20
      gpt-4-turbo:
        input: 10.00
        output: 30.00
      gpt-3.5-turbo:
        input: 0.50
        output: 1.50
  
  # Anthropic設定
  anthropic:
    model: "claude-sonnet-4-6"            # Claude Sonnet 4.6（最新）
    fallback_model: "claude-haiku-4-5-20251001"  # フォールバックモデル（コスト効率重視）
    max_tokens: 16384                      # 最大トークン数
    temperature: 0.85                      # 創造性パラメータ
    # 料金情報（USD per 1M tokens）
    costs:
      claude-opus-4-6:
        input: 5.00
        output: 25.00
      claude-sonnet-4-6:
        input: 3.00
        output: 15.00
      claude-haiku-4-5-20251001:
        input: 1.00
        output: 5.00
      claude-3-5-sonnet-20240620:
        input: 3.00
        output: 15.00
      claude-3-opus-20240229:
        input: 15.00
        output: 75.00
      claude-3-haiku-20240307:
        input: 0.25
        output: 1.25
  
  # Ollama設定（ローカルLLM）
  ollama:
    model: "gemma4:26b" # ← Macに入っているモデル名
    base_url: "http://192.168.0.73:11434/v1"  # ← MacのIPアドレス + OpenAI互換API
    max_tokens: 32768                      # 最大トークン数（Gemma4用に増量）
    temperature: 0.7                       # 創造性パラメータ（JSON生成のため低めに）
    costs: {}                              # ローカル実行なのでコスト0
  
  # 台本の構成比率（合計100%）
  # ラジオ番組の構成を3部に分割します。
  # ※週次ダイジェストと講座モードでは、この比率は使用されません。
  structure:
    main_topic_ratio: 70      # 本題（リサーチ結果を基にした議論・解説）
    listener_mail_ratio: 20   # リスナーメールコーナー（架空のメール紹介）
    ending_ratio: 10          # エンディング（まとめ・次回予告）
  
  # 通貨換算レート
  currency:
    usd_to_jpy: 150.0         # USD → JPY 換算レート

  # ---------------------------------------------------------------------------
  # Hierarchical Agentic Workflow オーケストレーター設定
  # ---------------------------------------------------------------------------
  # enabled: true にすると新アーキテクチャ（TopicCuration → SegmentGeneration）を使用
  # enabled: false にすると旧アーキテクチャ（単一API呼び出し）を使用
  # Orchestratorは全プロバイダー（Gemini/OpenAI/Anthropic/Ollama）に対応しています。
  # UIで選択したプロバイダーが自動的に使用されます。
  orchestrator:
    enabled: true               # true: 新アーキテクチャ（推奨） / false: 旧アーキテクチャ
    two_phase_generation: true  # true: 2段階生成（Markdown→JSON） / false: 1段階生成（直接JSON）
    curator_model: ""  # キュレーション・要約用軽量モデル（空=選択されたプロバイダーのデフォルトモデルを使用）
    segment_model: ""            # セグメント生成用モデル（空=選択されたプロバイダーのデフォルトモデルを使用）
    max_topics: 3                # キュレーションで選定する最大トピック数
    context_summary_max_length: 300  # 文脈要約の最大文字数
    # セグメント別ターン数設定
    intro:
      min_turns: 10
      max_turns: 20
    deep_dive:
      min_turns: 25
      max_turns: 45
    conclusion:
      min_turns: 10
      max_turns: 20

# -----------------------------------------------------------------------------
# 音声合成設定（VOICEVOX）
# -----------------------------------------------------------------------------
# 2人のパーソナリティの音声を合成します。
audio_synthesizer:
  # 話者ID設定 (VOICEVOX)
  # speaker_id一覧: https://voicevox.hiroshiba.jp/
  # 主な話者: 1=四国めたん, 3=ずんだもん, 8=春日部つむぎ
  speakers:
    main: 3      # メインパーソナリティ（ずんだもん・ノーマル）
    sub: 2       # サブパーソナリティ（四国めたん・ノーマル）
  
  # 音声パラメータ
  speed_scale: 1.1           # 話速（1.0=標準、1.1=やや速め）
  pitch_scale: 0.0           # 音高（0.0=標準）
  intonation_scale: 1.0      # 抑揚（1.0=標準）
  volume_scale: 1.0          # 音量（1.0=標準）
  
  # フレーズ間の無音時間（ミリ秒）
  pause_between_phrases_ms: 500   # 会話の間（500ms推奨）

# -----------------------------------------------------------------------------
# 動画生成設定（FFmpeg）
# -----------------------------------------------------------------------------
# 背景画像・音声・BGM・字幕を合成して最終動画を生成します。
video_renderer:
  # 出力設定
  output_resolution: "1920x1080"   # 解像度（YouTube推奨: 1920x1080）
  output_fps: 30                   # フレームレート（30fps推奨）
  output_codec: "libx264"          # 動画コーデック（H.264）
  output_audio_codec: "aac"        # 音声コーデック（AAC）
  output_audio_bitrate: "192k"     # 音声ビットレート
  # GPUアクセラレーション設定
  # true: NVIDIA GPUのNVENCを使用して高速エンコード（RTXシリーズ推奨）
  # false: CPUエンコード（libx264）を使用（GPU非搭載環境向け）
  use_gpu: true
  
  # BGM設定
  bgm_volume: 0.15           # BGM音量（0.0〜1.0、0.15=控えめ）
  bgm_fade_in_sec: 3.0       # フェードイン時間（秒）
  bgm_fade_out_sec: 3.0      # フェードアウト時間（秒）
  
  # BGMダッキング設定（ジングル再生中のBGM抑制）
  enable_bgm_ducking: true   # ジングル再生中のBGM抑制を有効化
  bgm_ducking_level: 0.04    # ダッキング時のBGM音量（通常の約1/4、-12dB相当）
  
  # セグメント単位の背景画像切り替え設定
  background_mode: "dynamic"  # "static": ローカルアセット選択 | "dynamic": FLUX.1動的生成
  
  # サムネイル背景生成設定
  thumbnail_background_mode: "dynamic"  # "static": 既存画像使用 | "dynamic": FLUX.1動的生成
  
  # ジングル設定（セグメント境界での演出）
  enable_jingles: true       # ジングル挿入を有効化
  jingle_overlap_sec: 0.0    # オーバーラップなし（完全同期モデル）
  pre_jingle_pause_sec: 0.5  # ジングル再生前の一拍（秒）- 自然な間を作る
  
  # 音声スペクトラム可視化（画面下部の波形表示）
  enable_spectrum: true      # スペクトラム表示を有効化
  spectrum_color: "0x00FF88" # スペクトラムの色（緑系）
  spectrum_mode: "cline"     # 表示モード: line, cline, bar

# -----------------------------------------------------------------------------
# FLUX.1 画像生成設定（Stable Diffusion WebUI Forge）
# -----------------------------------------------------------------------------
# セグメント背景・サムネイル背景の動的生成に使用します。
flux:
  base_url: "http://127.0.0.1:7890"  # Forge API URL
  timeout: 900  # API timeout (seconds) - 初回モデルロード + 低VRAM環境対応（600→900秒=15分に延長）
  
  # FLUX.1 [schnell] 超低VRAM対応設定
  steps: 8       # 10 → 8 (schnellは4-8ステップでも高品質、メモリ効率優先)
  width: 896     # 1024 → 896 (VRAM消費さらに削減、アスペクト比16:9維持)
  height: 504    # 576 → 504 (896x504 = 16:9)
  sampler_name: "Euler"
  scheduler: "Simple"
  cfg_scale: 1.0  # FLUX.1 [schnell] 必須設定
  
  # メモリ最適化設定
  max_concurrent_generations: 1  # 同時生成数制限（Semaphoreで実装済み）
  enable_vram_cleanup: true      # 生成後のVRAM自動クリーンアップ（実装済み）
  enable_pre_generation_cleanup: true  # 生成前のVRAMクリーンアップ（新規）
  
  # タイムアウト時の段階的フォールバック設定
  enable_resolution_fallback: true  # タイムアウト時に解像度を下げて再試行
  fallback_resolutions:  # フォールバック解像度リスト（優先度順）
    - [896, 504]   # 1st attempt (default)
    - [768, 432]   # 2nd attempt (VRAM削減)
    - [640, 360]   # 3rd attempt (最終手段)

# -----------------------------------------------------------------------------
# 映像オーバーレイ設定
# -----------------------------------------------------------------------------
# ここでは、動画上に重ねる補助情報の表示可否を制御します。
# 現在は chapter_title（台本の section 先頭行に付与）を画面上部に表示する
# Topic Overlay 機能を管理します。
video:
  # true: チャプターの話題タイトルを動画上部にオーバーレイ表示
  # false: トピックオーバーレイを表示しない
  show_topic_overlay: true

# -----------------------------------------------------------------------------
# パス設定
# -----------------------------------------------------------------------------
# アセットファイルと出力先のディレクトリを指定します。
paths:
  assets_dir: "assets"                              # アセットディレクトリ
  output_dir: "output"                              # 出力ディレクトリ
  background_image: "assets/backgrounds/default.png" # デフォルト背景画像
  bgm_file: "assets/bgm/default.mp3"                # デフォルトBGM

# -----------------------------------------------------------------------------
# パーソナリティ設定（プロンプト用）
# -----------------------------------------------------------------------------
# 2人のキャラクターの性格・口調を定義します。
# これらの設定は台本生成時にGeminiに渡されます。
personalities:
  main:
    name: "ずんだもん"
    description: "語尾は『〜なのだ』。好奇心旺盛だが少し抜けている。難しい専門用語は噛み砕いて話す。テンション高め。"
  sub:
    name: "めたん"
    description: "語尾は『〜わよ』『〜かしら』。冷静沈着なお嬢様。ずんだもんのボケに対して鋭くツッコミを入れる。博識。"

# -----------------------------------------------------------------------------
# 開発用設定（Mock Mode） [v3.3.2系で継続]
# -----------------------------------------------------------------------------
# APIを使用せずにローカルの固定データで動作するモード。
# 開発効率向上のため、API課金を避けながらテストが可能。
# 通常運用では、UIの Settings タブにある
# 「🧪 モックで動画を作成」ボタンから実行する想定です。
# 重要: Mockモード実行時は、upload設定がONでも実行時に強制OFFになります。
dev:
  # true: Perplexity/Gemini APIを呼び出さず、ローカルのテストデータを使用
  # false: 通常動作（APIを使用）
  mock_mode: false
  # モックデータの格納ディレクトリ（script.json, research.json, audio等）
  mock_data_path: "tests/mock_data"
  # true: Mockモード時にmetadata.txt生成をスキップ（高速化）
  mock_skip_metadata: true
  # true: Mockモード時にthumbnail.png生成をスキップ（高速化）
  mock_skip_thumbnail: true

# -----------------------------------------------------------------------------
# 公開・配信設定（YouTubeアップロード）
# -----------------------------------------------------------------------------
# 本セクションはUIのSettingsタブで明示的に保存（Save Settings）された値で上書きされます。
# テスト運用の推奨: enable_upload=false（本番投稿時のみ一時的にtrue）。
publishing:
  # true: 動画生成後にYouTubeへ自動アップロードを試行
  # false: アップロードせず、ローカル生成のみ
  enable_upload: true
  # 公開範囲: private / unlisted / public
  privacy_status: "unlisted"
  # YouTubeカテゴリID (27 = Education)
  category_id: "27"
  # YouTube再生リスト ID
  playlist_id: "PL4WSMEk7zObEZ3vRI_0qVg7T9sgHPIeVR"
  # 概要欄末尾に必ず含める固定タグ
  # metadata_builder.py 側で dynamic_tags と結合され、重複除去の上で出力されます。
  default_tags:
    - "#ずんだもん"
    - "#VOICEVOX"
    - "#AI"
    - "#ラジオ"
  # 概要欄末尾の定型フッター（著作権表示・免責等）
  # 参考:
  # - セクション見出し前は2行空行（視認性を確保）
  # - 見出し直後は0〜1行で内容を開始（情報チャンクを明確化）
  # - 参考文献は「📄 タイトル / 🔗 URL / 空行」の3行構造で出力
  footer_text: |
    -----------------------------------
    ■使用音声
    VOICEVOX:ずんだもん
    VOICEVOX:四国めたん
    -----------------------------------

# -----------------------------------------------------------------------------
# 開発・デバッグ設定
# -----------------------------------------------------------------------------
dev:
  mock_mode: false           # true: テストデータを使用（API呼び出しなし）
  mock_data_path: "tests/mock_data"  # モックデータのパス
  keep_temp_files: false     # true: 中間ファイルを削除しない（デバッグ用）
